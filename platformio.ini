[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
lib_deps = 
	olikraus/U8g2
    h2zero/NimBLE-Arduino
    claws/BH1750
    adafruit/Adafruit AHTX0
    adafruit/Adafruit BMP280 Library
